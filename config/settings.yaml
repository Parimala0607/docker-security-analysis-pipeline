targets:
  # Curated set of widely used Docker Hub images for a fresh batch scan.
  # Tags are pinned to keep the run reproducible.
  - alpine:3.20
  - ubuntu:24.04
  - debian:bookworm-slim
  - busybox:1.36
  - nginx:1.27
  - httpd:2.4
  - redis:7.4
  - postgres:16
  - mysql:8.4
  - mariadb:11.4
  - mongo:7
  - memcached:1.6
  - rabbitmq:3-management
  - node:22-bookworm-slim
  - python:3.12-slim
  - php:8.3-apache
  - golang:1.23
  - eclipse-temurin:21-jdk
  - eclipse-temurin:21-jre
  - tomcat:10.1
  - wordpress:6.6-php8.3-apache
  - drupal:11-php8.3-apache
  - traefik:v3.1
  - grafana/grafana:latest
  - prom/prometheus:latest
  - hashicorp/vault:latest
  - registry:2
  - jenkins/jenkins:lts-jdk21

severity_threshold: HIGH      # Minimum severity to include in report
fail_on: CRITICAL             # Exit code 1 if this severity is found

apis:
  nvd_key: ""                 # Free key from nvd.nist.gov
  epss_url: "https://api.first.org/data/v1/epss"
  kev_url: "https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json"

scoring:
  kev_multiplier: 2.0         # Double risk score if CVE is in CISA KEV
  epss_threshold: 0.1         # Only flag CVEs with >10% exploit probability

output:
  results_dir: "./results"
  reports_dir: "./reports"
  remediated_dir: "./remediated"
